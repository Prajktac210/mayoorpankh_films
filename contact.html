<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Mayoorpankh Films</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== GLOBAL ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:#fff;
}

/* ===== HEADER ===== */
.header{
text-align:center;
padding:50px 20px 20px;
}

.header h1{
font-size:40px;
letter-spacing:3px;
}

.header p{
color:#aaa;
margin-top:10px;
}

/* ===== MAIN LAYOUT ===== */
.contact-container{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* ===== LEFT SIDE ===== */
.contact-info{
background:#111;
padding:30px;
border-radius:10px;
}

.contact-info h2{
margin-bottom:20px;
}

.info-item{
margin-bottom:15px;
display:flex;
align-items:center;
gap:10px;
color:#ccc;
}

.info-item i{
color:#fff;
}

/* ===== SOCIAL ===== */
.social{
margin-top:20px;
display:flex;
gap:15px;
}

.social a{
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
color:#fff;
text-decoration:none;
}

.instagram{
background: radial-gradient(circle at 30% 30%, #feda75, #d62976, #962fbf);
}

.whatsapp{
background:#25D366;
}

/* ===== MAP ===== */
.map{
margin-top:20px;
border-radius:10px;
overflow:hidden;
}

.map iframe{
width:100%;
height:200px;
border:0;
}

/* ===== FORM ===== */
.contact-form{
background:#111;
padding:30px;
border-radius:10px;
}

.contact-form h2{
margin-bottom:20px;
}

.contact-form input,
.contact-form textarea,
.contact-form select{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
outline:none;
background:#222;
color:#fff;
border-radius:5px;
}

/* BUTTON */
.contact-form button{
width:100%;
padding:12px;
border:none;
background:#fff;
color:#000;
cursor:pointer;
border-radius:5px;
transition:0.3s;
}

.contact-form button:hover{
transform:scale(1.05);
}

/* ===== FOOTER ===== */
.footer{
text-align:center;
padding:15px;
color:#aaa;
border-top:1px solid #222;
margin-top:30px;
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
.contact-container{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<h1>Contact Us</h1>
<p>Let’s capture your beautiful moments together 📸</p>
</div>

<!-- MAIN -->
<div class="contact-container">

<!-- LEFT SIDE -->
<div class="contact-info">

<h2>Get in Touch</h2>

<div class="info-item">
<i class="fas fa-phone"></i>
<span>+918329682942</span>
</div>

<div class="info-item">
<i class="fas fa-envelope"></i>
<span>mayoorpankhfilms@gmail.com</span>
</div>

<div class="info-item">
<i class="fas fa-location-dot"></i>
<span>shirwal,satara</span>
</div>


<!-- MAP -->
<div class="map">
<iframe src="https://www.google.com/maps?q=shirwal&output=embed"></iframe>
</div>

</div>

<!-- RIGHT SIDE FORM -->
<div class="contact-form">

<h2>Send Message</h2>

<form onsubmit="sendWhatsApp(); return false;">

<input type="text" id="name" placeholder="Your Name" required>

<input type="tel" id="phone" placeholder="Phone Number" required>

<!-- SERVICE TYPE -->
<select id="service" required>
<option value="">Select Service</option>
<option value="Wedding Photography">Wedding Photography</option>
<option value="Pre-Wedding Shoot">Pre-Wedding Shoot</option>
<option value="Cinematography">Cinematography</option>
<option value="Event Photography">Event Photography</option>
<option value="Birthday Shoot">Birthday Shoot</option>
<option value="Other">Other</option>
</select>

<!-- DATE -->
<input type="date" id="date">

<textarea id="message" rows="5" placeholder="Your Message"></textarea>

<button type="submit">Send via WhatsApp</button>

</form>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
© 2026 All Rights Reserved | Designed by <b>PC Creation</b>
</div>

<script>

/* ===== WHATSAPP FUNCTION ===== */
function sendWhatsApp(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let service = document.getElementById("service").value;
let date = document.getElementById("date").value;
let message = document.getElementById("message").value;

let url = "https://wa.me/918329682942?text="
+ "Name: " + name + "%0a"
+ "Phone: " + phone + "%0a"
+ "Service: " + service + "%0a"
+ "Event Date: " + date + "%0a"
+ "Message: " + message;

window.open(url, '_blank');
}

</script>

</body>
</html>
